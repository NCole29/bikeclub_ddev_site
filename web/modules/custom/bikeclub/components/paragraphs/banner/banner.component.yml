$schema: https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json
name: Banner 
description: Banner with title and CTA link
props:
  type: object
  properties:
    heading:
      title: Heading
      description: Title for the banner text
      examples:
        - Join us at the Conference
      type: string
    button:
      title: CTA button
      type: string
      examples: 
        - Click me!
    image:
      type: string
      label: The image URL or data.
slots:
  content:
    title: Content