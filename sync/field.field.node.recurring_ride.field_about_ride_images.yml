settings:
  markup:
    value: '<p>Click "Add media" to select a picture from previously uploaded images or upload a new file.&nbsp;</p><p>When uploading, please include a descriptive <strong>Alternative text</strong>, which is displayed under images in the library and is searchable.</p><p>Click <strong>Crop image</strong> and adjust the frame to ensure a consistent, standard look across all ride pages.&nbsp;</p><p>Please keep files under 2MB; images are automatically optimized for display, making larger files unnecessary. If needed, use Apple Preview (Mac) or <a href="https://learn.microsoft.com/en-us/windows/powertoys/image-resizer">Microsoft PowerToys</a> (Windows) to resize images to "Large" (up to 1920x1080 pixels).</p><p>&nbsp;</p>'
